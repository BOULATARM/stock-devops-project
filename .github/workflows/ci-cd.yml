name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

env:
  IMAGE_NAME: mouadboulatar/flask-stock-app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        push: true
        tags: |
          ${{ env.IMAGE_NAME }}:latest
          ${{ env.IMAGE_NAME }}:${{ github.sha }}
    
    - name: Install kubectl
      run: |
        curl -LO "https://dl.k8s.io/release/v1.29.15/bin/linux/amd64/kubectl"
        chmod +x kubectl
        sudo mv kubectl /usr/local/bin/kubectl
    
    - name: Configure kubectl
      run: |
        mkdir -p ~/.kube
        echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
        kubectl config set-cluster default --insecure-skip-tls-verify=true
    
    - name: Deploy to K3s
      run: |
        kubectl set image deployment/flask-stock-app \
          flask-stock-app=${{ env.IMAGE_NAME }}:${{ github.sha }} --record
        kubectl rollout status deployment/flask-stock-app
