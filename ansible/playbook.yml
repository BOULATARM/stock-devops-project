---
- name: Install K3s on master
  hosts: masters
  become: true
  tasks:
    - name: Install K3s on master
      shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s
      register: k3s_install

    - name: Wait for K3s to be fully ready
      pause:
        seconds: 10
      when: k3s_install.changed

    - name: Wait for K3s API to be ready
      wait_for:
        port: 6443
        host: "{{ ansible_default_ipv4.address }}"
        delay: 10
        timeout: 300

    - name: Get K3s token
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token

    - name: Save K3s token to file
      copy:
        content: "{{ k3s_token.content | b64decode }}"
        dest: /home/ubuntu/k3s-token.txt
        owner: ubuntu
        mode: '0644'

    - name: Configure kubectl for ubuntu user
      shell: |
        mkdir -p /home/ubuntu/.kube
        cp -i /etc/rancher/k3s/k3s.yaml /home/ubuntu/.kube/config
        chown -R ubuntu:ubuntu /home/ubuntu/.kube
        sed -i 's/127.0.0.1/{{ ansible_default_ipv4.address }}/g' /home/ubuntu/.kube/config

    - name: Verify cluster is ready
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl get nodes
      register: nodes_check
      changed_when: false
      ignore_errors: yes

    - name: Display initial nodes
      debug:
        msg: "Master node is ready: {{ nodes_check.stdout_lines if nodes_check.stdout_lines is defined else 'Checking...' }}"

- name: Join worker to K3s cluster
  hosts: workers
  become: true
  tasks:
    - name: Fetch K3s token from master
      slurp:
        src: /home/ubuntu/k3s-token.txt
      delegate_to: "{{ groups['masters'][0] }}"
      register: k3s_token_slurp
      delegate_facts: true

    - name: Set K3s token fact
      set_fact:
        k3s_token: "{{ k3s_token_slurp.content | b64decode | trim }}"

    - name: Get master IP
      set_fact:
        master_ip: "{{ hostvars[groups['masters'][0]]['ansible_default_ipv4'].address }}"

    - name: Install K3s on worker
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ master_ip }}:6443 K3S_TOKEN={{ k3s_token }} sh -
      args:
        creates: /usr/local/bin/k3s
      register: worker_install

    - name: Wait for worker to be ready
      pause:
        seconds: 15
      when: worker_install.changed

- name: Show final cluster status
  hosts: masters
  become: true
  tasks:
    - name: Get nodes (from master)
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl get nodes -o wide
      register: nodes_output
      changed_when: false

    - name: Display cluster nodes
      debug:
        var: nodes_output.stdout_lines

    - name: Get pods (system)
      become_user: ubuntu
      shell: |
        export KUBECONFIG=/home/ubuntu/.kube/config
        kubectl get pods -A
      register: pods_output
      changed_when: false

    - name: Display system pods
      debug:
        var: pods_output.stdout_lines

- name: Final summary
  hosts: all
  gather_facts: false
  tasks:
    - name: Print completion message
      debug:
        msg:
          - "══════════════════════════════════════════════════════════════════════════"
          - "✅ INFRASTRUCTURE COMPLÈTEMENT DÉPLOYÉE AVEC SUCCÈS !"
          - "══════════════════════════════════════════════════════════════════════════"
          - "📌 CLUSTER K3S:"
          - "   Master: {{ hostvars[groups['masters'][0]]['ansible_default_ipv4'].address if groups['masters'] else 'N/A' }}"
          - "   Worker: {{ hostvars[groups['workers'][0]]['ansible_default_ipv4'].address if groups['workers'] else 'N/A' }}"
          - ""
          - "📌 APPLICATION FLASK:"
          - "   Pour déployer: cd k8s && kubectl apply -f deployment.yaml -f service.yaml"
          - "   Accès: http://{{ hostvars[groups['workers'][0]]['ansible_default_ipv4'].address if groups['workers'] else 'N/A' }}:30080"
          - ""
          - "📌 GITHUB ACTIONS:"
          - "   Configure les secrets GitHub avec :"
          - "   - DOCKER_USERNAME: mouadboulatar"
          - "   - DOCKER_PASSWORD: (ton token)"
          - "   - MASTER_IP: {{ hostvars[groups['masters'][0]]['ansible_default_ipv4'].address if groups['masters'] else 'N/A' }}"
          - "   - WORKER_IP: {{ hostvars[groups['workers'][0]]['ansible_default_ipv4'].address if groups['workers'] else 'N/A' }}"
          - "   - KUBECONFIG: (contenu de /home/ubuntu/.kube/config du master)"
          - "══════════════════════════════════════════════════════════════════════════"