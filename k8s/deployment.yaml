apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-stock-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-stock-app
  template:
    metadata:
      labels:
        app: flask-stock-app
    spec:
      containers:
      - name: flask-stock-app
        image: mouadboulatar/flask-stock-app:latest
        ports:
        - containerPort: 5000
        volumeMounts:
        - name: stock-data
          mountPath: /data  # Important : où la DB sera stockée
      volumes:
      - name: stock-data
        persistentVolumeClaim:
          claimName: stock-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: stock-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi