apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-stock-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flask-stock-app
  template:
    metadata:
      labels:
        app: flask-stock-app
    spec:
      containers:
        - name: flask-stock-app
          image: mouadboulatar/flask-stock-app:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
          volumeMounts:
            - name: stock-data
              mountPath: /data
      volumes:
        - name: stock-data
          hostPath:
            path: /tmp/flask-stock-data
            type: DirectoryOrCreate