apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-stock-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-stock-app
  template:
    metadata:
      labels:
        app: flask-stock-app
    spec:
      containers:
        - name: flask-stock-app
          image: mouadboulatar/flask-stock-app:latest
          ports:
            - containerPort: 5000